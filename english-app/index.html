<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="English Trainer">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>English Trainer</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <h1 data-action="showDashboard" tabindex="0" role="button" aria-label="Volver al dashboard">English <span>Trainer</span></h1>
    <div class="header-right">
      <button id="btnStop" data-action="stopSpeech" aria-label="Detener reproduccion de voz">&#9632;</button>
      <button id="btnTheme" data-action="toggleTheme" aria-label="Cambiar tema claro/oscuro">&#9790;</button>
      <button id="btnSettings" data-action="toggleSettings" aria-label="Abrir ajustes">&#9881;</button>
    </div>
  </header>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-panel-inner">
      <div class="settings-row">
        <label for="speed">Velocidad:</label>
        <input type="range" id="speed" min="0.3" max="1.5" step="0.1" value="0.8" aria-label="Velocidad de voz">
        <span id="speedVal" aria-live="polite">0.8x</span>
      </div>
      <div class="settings-row">
        <label for="voiceSelect">Voz:</label>
        <select id="voiceSelect" aria-label="Seleccionar voz en ingles"><option>Voces...</option></select>
      </div>
      <div class="settings-row settings-actions">
        <button id="btnExport" data-action="exportProgress" aria-label="Exportar progreso">Exportar</button>
        <button id="btnRetakeTest" data-action="retakeTest" aria-label="Repetir test de nivel">Repetir test</button>
        <button id="btnReset" data-action="resetProgress" aria-label="Reiniciar todo el progreso">Reiniciar</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav" aria-label="Navegacion principal">
    <button class="bottom-tab active" id="tab-plan" data-action="navigateTo" data-page="plan" aria-label="Sesiones">
      <span class="tab-icon">&#127911;</span>
      <span class="tab-label">Sesiones</span>
    </button>
    <button class="bottom-tab" id="tab-flashcards" data-action="navigateTo" data-page="flashcards" aria-label="Flashcards de vocabulario">
      <span class="tab-icon">&#127183;</span>
      <span class="tab-label">Flashcards</span>
    </button>
    <button class="bottom-tab" id="tab-translator" data-action="navigateTo" data-page="translator" aria-label="Traductor">
      <span class="tab-icon">&#127760;</span>
      <span class="tab-label">Traductor</span>
    </button>
    <button class="bottom-tab" id="tab-achievements" data-action="navigateTo" data-page="achievements" aria-label="Logros">
      <span class="tab-icon">&#9733;</span>
      <span class="tab-label">Logros</span>
    </button>
  </nav>

  <div class="progress-bar-container" id="progressContainer" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressBar"></div>
      <div class="progress-text" id="progressText">Nivel: A1 — 0%</div>
    </div>
  </div>

  <main id="main" role="main"></main>

  <!-- Scripts: loaded in dependency order -->
  <script src="js/vocab-data.js"></script>
  <script src="js/plan-data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/modules.js"></script>
  <script src="js/level-test.js"></script>
  <script src="js/integrator-sessions.js"></script>
  <script src="js/mini-test.js"></script>
  <script src="js/session.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/gamification.js"></script>
  <script src="js/views.js"></script>
  <script src="js/flashcards.js"></script>
  <script src="js/translator.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
